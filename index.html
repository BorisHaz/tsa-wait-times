<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSA WAIT TIMES</title>
  <style>
    :root {
      --bg:          #070b18;
      --card:        #0e1428;
      --border:      #263060;
      --cyan:        #00f5ff;
      --green:       #00ff88;
      --yellow:      #ffe600;
      --red:         #ff2244;
      --orange:      #ff8800;
      --text:        #f0f6ff;
      --muted:       #98b0e0;
      --dim:         #6a84c0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', 'Lucida Console', monospace;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Grid overlay — very faint */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.012) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanlines — off */
    body::after { display: none; }

    header, .search-bar, .legend, .region, #error-container, #app {
      position: relative; z-index: 1;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow:
        0 0 8px var(--cyan),
        0 0 25px var(--cyan),
        0 0 60px rgba(0,245,255,0.3);
      margin-bottom: 0.4rem;
    }

    header p {
      color: var(--dim);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .meta {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.2rem;
      margin-top: 0.9rem;
      flex-wrap: wrap;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(0,245,255,0.06);
      border: 1px solid rgba(0,245,255,0.4);
      color: var(--cyan);
      padding: 0.28rem 0.9rem;
      border-radius: 2px;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      box-shadow: 0 0 12px rgba(0,245,255,0.15), inset 0 0 8px rgba(0,245,255,0.04);
    }

    .dot {
      width: 6px; height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--cyan);
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--cyan); }
      50%       { opacity: 0.25; box-shadow: none; }
    }

    .last-updated { color: var(--dim); font-size: 0.7rem; letter-spacing: 0.06em; }

    /* ── SEARCH ── */
    .search-bar { display: flex; justify-content: center; margin-bottom: 2rem; }

    .search-bar input {
      background: rgba(0,245,255,0.03);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 2px;
      color: var(--cyan);
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      font-family: inherit;
      width: 100%; max-width: 420px;
      outline: none;
      letter-spacing: 0.1em;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar input::placeholder { color: var(--muted); }
    .search-bar input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 16px rgba(0,245,255,0.2);
    }

    /* ── LEGEND ── */
    .legend {
      display: flex; justify-content: center;
      gap: 1.4rem; flex-wrap: wrap;
      margin-bottom: 2rem;
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .legend span { display: flex; align-items: center; gap: 0.4rem; }
    .legend-dot  { width: 8px; height: 8px; border-radius: 50%; }

    /* ── REGION ── */
    .region { max-width: 1100px; margin: 0 auto 2.5rem; }

    .region-title {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,245,255,0.55);
      margin-bottom: 0.8rem;
      padding-left: 0.3rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 0.7rem;
    }

    /* ── CARD BASE ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.9rem 1rem;
      cursor: default;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    /* left accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 2px; height: 100%;
      background: var(--border);
      transition: background 0.2s, box-shadow 0.2s;
    }

    .card:hover { border-color: rgba(0,245,255,0.2); }
    .card:hover::before {
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }

    /* ── FEATURED CARD (JFK · EWR · PHL) ── */
    .card.featured {
      padding: 1.1rem 1.15rem;
      border-color: rgba(255,136,0,0.35);
      background: rgba(255,136,0,0.03);
    }

    .card.featured::before {
      background: var(--orange);
      box-shadow: 0 0 10px var(--orange);
    }

    /* top-right corner bracket */
    .card.featured::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 14px; height: 14px;
      border-top: 2px solid var(--orange);
      border-right: 2px solid var(--orange);
    }

    .card.featured:hover {
      border-color: rgba(255,136,0,0.7);
      box-shadow: 0 0 20px rgba(255,136,0,0.12);
    }

    .nearby-tag {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
      opacity: 0.85;
    }

    /* ── CARD CONTENT ── */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.55rem;
    }

    .airport-code {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .card.featured .airport-code {
      font-size: 1.45rem;
      color: var(--orange);
      text-shadow: 0 0 12px rgba(255,136,0,0.45);
    }

    .airport-name {
      color: var(--muted);
      font-size: 0.7rem;
      margin-top: 0.15rem;
      letter-spacing: 0.02em;
    }

    /* ── WAIT PILL ── */
    .wait-pill {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.55rem;
      border-radius: 2px;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    .wait-low    { color: var(--green);  border: 1px solid rgba(0,255,136,0.35); background: rgba(0,255,136,0.08);  box-shadow: 0 0 8px rgba(0,255,136,0.1); }
    .wait-medium { color: var(--yellow); border: 1px solid rgba(255,230,0,0.35); background: rgba(255,230,0,0.08);  box-shadow: 0 0 8px rgba(255,230,0,0.1); }
    .wait-high   { color: var(--red);    border: 1px solid rgba(255,34,68,0.35); background: rgba(255,34,68,0.08);  box-shadow: 0 0 8px rgba(255,34,68,0.1); }
    .wait-na     { color: var(--muted);  border: 1px solid rgba(46,58,94,0.5);   background: rgba(46,58,94,0.15); }

    /* ── PROGRESS BAR ── */
    .wait-bar-wrap {
      height: 2px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
      margin-top: 0.65rem;
    }
    .card.featured .wait-bar-wrap { height: 3px; margin-top: 0.8rem; }

    .wait-bar { height: 100%; transition: width 0.5s ease; }

    .bar-low    { background: var(--green);  box-shadow: 0 0 6px var(--green); }
    .bar-medium { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .bar-high   { background: var(--red);    box-shadow: 0 0 6px var(--red); }
    .bar-na     { background: var(--muted); }

    /* ── DRIVE TIME ── */
    .drive-time {
      margin-top: 0.55rem;
      font-size: 0.67rem;
      color: var(--orange);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      opacity: 0.9;
    }

    /* ── MISC ── */
    .loading {
      text-align: center;
      color: var(--dim);
      padding: 3rem;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .error-banner {
      text-align: center;
      color: var(--red);
      background: rgba(255,34,68,0.05);
      border: 1px solid rgba(255,34,68,0.3);
      border-radius: 2px;
      padding: 1rem;
      max-width: 600px;
      margin: 0 auto 2rem;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<header>
  <div class="header-label">&#9632; System Online &#9632;</div>
  <h1>// TSA WAIT TIMES</h1>
  <p>Security checkpoint estimates &nbsp;&middot;&nbsp; Major US airports</p>
  <div class="meta">
    <div class="live-badge"><div class="dot"></div>&nbsp;Estimated</div>
    <div class="last-updated" id="last-updated">Loading...</div>
  </div>
</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="[ SEARCH: JFK, LOS ANGELES... ]" oninput="filterAirports()" />
</div>

<div class="legend">
  <span><div class="legend-dot" style="background:var(--green);box-shadow:0 0 5px var(--green)"></div>&lt; 15 min</span>
  <span><div class="legend-dot" style="background:var(--yellow);box-shadow:0 0 5px var(--yellow)"></div>15–30 min</span>
  <span><div class="legend-dot" style="background:var(--red);box-shadow:0 0 5px var(--red)"></div>30+ min</span>
  <span><div class="legend-dot" style="background:var(--orange);box-shadow:0 0 5px var(--orange)"></div>Nearby · Cherry Hill NJ</span>
</div>

<div id="error-container"></div>
<div id="app"><div class="loading">[ Initializing... ]</div></div>

<script>
const AIRPORTS = {
  "Northeast": [
    { code: "JFK", name: "John F. Kennedy, New York" },
    { code: "LGA", name: "LaGuardia, New York" },
    { code: "EWR", name: "Newark Liberty, NJ" },
    { code: "BOS", name: "Boston Logan" },
    { code: "PHL", name: "Philadelphia Intl" },
    { code: "DCA", name: "Washington Reagan" },
    { code: "IAD", name: "Washington Dulles" },
    { code: "BWI", name: "Baltimore/Washington" },
  ],
  "Southeast": [
    { code: "ATL", name: "Hartsfield-Jackson, Atlanta" },
    { code: "MCO", name: "Orlando Intl" },
    { code: "MIA", name: "Miami Intl" },
    { code: "FLL", name: "Fort Lauderdale" },
    { code: "TPA", name: "Tampa Intl" },
    { code: "CLT", name: "Charlotte Douglas" },
    { code: "RDU", name: "Raleigh-Durham" },
    { code: "MSY", name: "New Orleans" },
  ],
  "Midwest": [
    { code: "ORD", name: "Chicago O'Hare" },
    { code: "MDW", name: "Chicago Midway" },
    { code: "DTW", name: "Detroit Metro" },
    { code: "MSP", name: "Minneapolis-St. Paul" },
    { code: "STL", name: "St. Louis Lambert" },
    { code: "CMH", name: "Columbus Intl" },
    { code: "CLE", name: "Cleveland Hopkins" },
    { code: "IND", name: "Indianapolis Intl" },
  ],
  "South & Southwest": [
    { code: "DFW", name: "Dallas/Fort Worth" },
    { code: "DAL", name: "Dallas Love Field" },
    { code: "IAH", name: "Houston Bush" },
    { code: "HOU", name: "Houston Hobby" },
    { code: "PHX", name: "Phoenix Sky Harbor" },
    { code: "LAS", name: "Las Vegas Harry Reid" },
    { code: "DEN", name: "Denver Intl" },
    { code: "SAT", name: "San Antonio Intl" },
  ],
  "West Coast": [
    { code: "LAX", name: "Los Angeles Intl" },
    { code: "SFO", name: "San Francisco Intl" },
    { code: "SJC", name: "San Jose Mineta" },
    { code: "OAK", name: "Oakland Intl" },
    { code: "SEA", name: "Seattle-Tacoma" },
    { code: "PDX", name: "Portland Intl" },
    { code: "SAN", name: "San Diego Intl" },
    { code: "SNA", name: "Orange County" },
  ],
};

const FEATURED = ["JFK", "EWR", "PHL"];
let allData = {};
let driveTimes = {};

function waitClass(m) {
  if (m === null) return "wait-na";
  if (m < 15)    return "wait-low";
  if (m < 30)    return "wait-medium";
  return "wait-high";
}
function barClass(m) {
  if (m === null) return "bar-na";
  if (m < 15)    return "bar-low";
  if (m < 30)    return "bar-medium";
  return "bar-high";
}
function barWidth(m) {
  if (m === null) return "15%";
  return Math.min((m / 60) * 100, 100) + "%";
}
function waitLabel(m) {
  if (m === null) return "N/A";
  if (m === 0)   return "< 1 min";
  return `~${m} min`;
}
function driveLabel(mins) {
  if (!mins) return null;
  if (mins < 60) return `${mins} min drive`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? `${h}h ${m}m drive` : `${h}h drive`;
}

async function loadAll() {
  try {
    const res = await fetch("data.json?t=" + Date.now());
    if (!res.ok) throw new Error("fetch failed");
    const json = await res.json();

    if (json.wait_times) Object.assign(allData, json.wait_times);
    if (json.drive_times) Object.assign(driveTimes, json.drive_times);

    if (json.updated_at) {
      const d = new Date(json.updated_at);
      document.getElementById("last-updated").textContent =
        "Updated: " + d.toLocaleString();
    } else {
      document.getElementById("last-updated").textContent = "Pending first update";
    }
  } catch {
    document.getElementById("last-updated").textContent = "Data unavailable";
    document.getElementById("error-container").innerHTML =
      `<div class="error-banner">[ ERROR ] Could not load data.json</div>`;
  }
  render();
}

function render(filter = "") {
  const app = document.getElementById("app");
  app.innerHTML = "";
  let anyVisible = false;

  for (const [region, airports] of Object.entries(AIRPORTS)) {
    const filtered = airports.filter(a =>
      !filter ||
      a.code.toLowerCase().includes(filter) ||
      a.name.toLowerCase().includes(filter)
    );
    if (filtered.length === 0) continue;
    anyVisible = true;

    const section = document.createElement("div");
    section.className = "region";
    section.innerHTML = `<div class="region-title">// ${region}</div><div class="grid"></div>`;
    const grid = section.querySelector(".grid");

    filtered.forEach(airport => {
      const wait   = allData[airport.code] ?? null;
      const wClass = waitClass(wait);
      const bClass = barClass(wait);
      const isFeat = FEATURED.includes(airport.code);
      const drive  = isFeat ? driveLabel(driveTimes[airport.code]) : null;

      const card = document.createElement("div");
      card.className = "card" + (isFeat ? " featured" : "");
      card.innerHTML = `
        ${isFeat ? `<div class="nearby-tag">&#9670; Nearby</div>` : ""}
        <div class="card-header">
          <div>
            <div class="airport-code">${airport.code}</div>
            <div class="airport-name">${airport.name}</div>
          </div>
          <div class="wait-pill ${wClass}">${waitLabel(wait)}</div>
        </div>
        <div class="wait-bar-wrap">
          <div class="wait-bar ${bClass}" style="width:${barWidth(wait)}"></div>
        </div>
        ${drive ? `<div class="drive-time">&#9654; ${drive} (no traffic)</div>` : ""}
      `;
      grid.appendChild(card);
    });

    app.appendChild(section);
  }

  if (!anyVisible) {
    app.innerHTML = `<div class="loading">[ No results for "${filter}" ]</div>`;
  }
}

function filterAirports() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  render(q);
}

loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
