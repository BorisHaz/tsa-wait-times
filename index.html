<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSA Wait Times</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --green: #2ea043;
      --yellow: #d29922;
      --red: #da3633;
      --blue: #388bfd;
      --text: #e6edf3;
      --muted: #8b949e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .meta {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(46, 160, 67, 0.15);
      border: 1px solid var(--green);
      color: var(--green);
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .last-updated {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .search-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .search-bar input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.6rem 1rem;
      font-size: 0.95rem;
      width: 100%;
      max-width: 400px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--blue);
    }

    .region {
      max-width: 1100px;
      margin: 0 auto 2.5rem;
    }

    .region-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.8rem;
      padding-left: 0.25rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      transition: border-color 0.2s;
      cursor: default;
    }

    .card:hover {
      border-color: #484f58;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.6rem;
    }

    .airport-code {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .airport-name {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 0.1rem;
    }

    .wait-pill {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 50px;
      white-space: nowrap;
    }

    .wait-low    { background: rgba(46, 160, 67, 0.15);  color: var(--green);  border: 1px solid rgba(46,160,67,0.3); }
    .wait-medium { background: rgba(210, 153, 34, 0.15); color: var(--yellow); border: 1px solid rgba(210,153,34,0.3); }
    .wait-high   { background: rgba(218, 54, 51, 0.15);  color: var(--red);    border: 1px solid rgba(218,54,51,0.3); }
    .wait-na     { background: rgba(139, 148, 158, 0.1); color: var(--muted);  border: 1px solid rgba(139,148,158,0.2); }

    .wait-bar-wrap {
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.6rem;
    }

    .wait-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .bar-low    { background: var(--green); }
    .bar-medium { background: var(--yellow); }
    .bar-high   { background: var(--red); }
    .bar-na     { background: var(--muted); }

    .loading {
      text-align: center;
      color: var(--muted);
      padding: 3rem;
      font-size: 0.95rem;
    }

    .error-banner {
      text-align: center;
      color: var(--red);
      background: rgba(218,54,51,0.1);
      border: 1px solid rgba(218,54,51,0.3);
      border-radius: 8px;
      padding: 1rem;
      max-width: 600px;
      margin: 0 auto 2rem;
      font-size: 0.9rem;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .legend span { display: flex; align-items: center; gap: 0.4rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  </style>
</head>
<body>

<header>
  <h1>✈️ TSA Wait Times</h1>
  <p>Live security checkpoint wait times across major US airports</p>
  <div class="meta">
    <div class="live-badge"><div class="dot"></div> Live</div>
    <div class="last-updated" id="last-updated">Loading...</div>
  </div>
</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search airport (e.g. JFK, Los Angeles...)" oninput="filterAirports()" />
</div>

<div class="legend">
  <span><div class="legend-dot" style="background:var(--green)"></div> &lt; 15 min</span>
  <span><div class="legend-dot" style="background:var(--yellow)"></div> 15–30 min</span>
  <span><div class="legend-dot" style="background:var(--red)"></div> 30+ min</span>
  <span><div class="legend-dot" style="background:var(--muted)"></div> No data</span>
</div>

<div id="error-container"></div>
<div id="app"><div class="loading">Fetching wait times...</div></div>

<script>
const AIRPORTS = {
  "Northeast": [
    { code: "JFK", name: "John F. Kennedy, New York" },
    { code: "LGA", name: "LaGuardia, New York" },
    { code: "EWR", name: "Newark Liberty, NJ" },
    { code: "BOS", name: "Boston Logan" },
    { code: "PHL", name: "Philadelphia Intl" },
    { code: "DCA", name: "Washington Reagan" },
    { code: "IAD", name: "Washington Dulles" },
    { code: "BWI", name: "Baltimore/Washington" },
  ],
  "Southeast": [
    { code: "ATL", name: "Hartsfield-Jackson, Atlanta" },
    { code: "MCO", name: "Orlando Intl" },
    { code: "MIA", name: "Miami Intl" },
    { code: "FLL", name: "Fort Lauderdale" },
    { code: "TPA", name: "Tampa Intl" },
    { code: "CLT", name: "Charlotte Douglas" },
    { code: "RDU", name: "Raleigh-Durham" },
    { code: "MSY", name: "New Orleans" },
  ],
  "Midwest": [
    { code: "ORD", name: "Chicago O'Hare" },
    { code: "MDW", name: "Chicago Midway" },
    { code: "DTW", name: "Detroit Metro" },
    { code: "MSP", name: "Minneapolis-St. Paul" },
    { code: "STL", name: "St. Louis Lambert" },
    { code: "CMH", name: "Columbus Intl" },
    { code: "CLE", name: "Cleveland Hopkins" },
    { code: "IND", name: "Indianapolis Intl" },
  ],
  "South & Southwest": [
    { code: "DFW", name: "Dallas/Fort Worth" },
    { code: "DAL", name: "Dallas Love Field" },
    { code: "IAH", name: "Houston Bush" },
    { code: "HOU", name: "Houston Hobby" },
    { code: "PHX", name: "Phoenix Sky Harbor" },
    { code: "LAS", name: "Las Vegas Harry Reid" },
    { code: "DEN", name: "Denver Intl" },
    { code: "SAT", name: "San Antonio Intl" },
  ],
  "West Coast": [
    { code: "LAX", name: "Los Angeles Intl" },
    { code: "SFO", name: "San Francisco Intl" },
    { code: "SJC", name: "San Jose Mineta" },
    { code: "OAK", name: "Oakland Intl" },
    { code: "SEA", name: "Seattle-Tacoma" },
    { code: "PDX", name: "Portland Intl" },
    { code: "SAN", name: "San Diego Intl" },
    { code: "SNA", name: "Orange County" },
  ],
};

let allData = {};

function waitClass(minutes) {
  if (minutes === null) return "wait-na";
  if (minutes < 15) return "wait-low";
  if (minutes < 30) return "wait-medium";
  return "wait-high";
}

function barClass(minutes) {
  if (minutes === null) return "bar-na";
  if (minutes < 15) return "bar-low";
  if (minutes < 30) return "bar-medium";
  return "bar-high";
}

function barWidth(minutes) {
  if (minutes === null) return "20%";
  return Math.min((minutes / 60) * 100, 100) + "%";
}

function waitLabel(minutes) {
  if (minutes === null) return "N/A";
  if (minutes === 0) return "< 1 min";
  return `~${minutes} min`;
}

async function loadAll() {
  try {
    const res = await fetch("data.json?t=" + Date.now());
    if (!res.ok) throw new Error("Failed to load data.json");
    const json = await res.json();

    // Populate allData from the fetched JSON
    if (json.wait_times) {
      Object.assign(allData, json.wait_times);
    }

    // Show last updated time from the JSON file
    if (json.updated_at) {
      const d = new Date(json.updated_at);
      document.getElementById("last-updated").textContent =
        "Last updated: " + d.toLocaleString();
    } else {
      document.getElementById("last-updated").textContent = "Data pending first update";
    }
  } catch (e) {
    document.getElementById("last-updated").textContent = "Could not load data";
    document.getElementById("error-container").innerHTML =
      `<div class="error-banner">Could not load wait time data. It will be available after the first automated update.</div>`;
  }

  render();
}

function render(filter = "") {
  const app = document.getElementById("app");
  app.innerHTML = "";

  let anyVisible = false;

  for (const [region, airports] of Object.entries(AIRPORTS)) {
    const filtered = airports.filter(a =>
      !filter ||
      a.code.toLowerCase().includes(filter) ||
      a.name.toLowerCase().includes(filter)
    );
    if (filtered.length === 0) continue;
    anyVisible = true;

    const section = document.createElement("div");
    section.className = "region";
    section.innerHTML = `<div class="region-title">${region}</div><div class="grid"></div>`;
    const grid = section.querySelector(".grid");

    filtered.forEach(airport => {
      const wait = allData[airport.code] ?? null;
      const wClass = waitClass(wait);
      const bClass = barClass(wait);

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="airport-code">${airport.code}</div>
            <div class="airport-name">${airport.name}</div>
          </div>
          <div class="wait-pill ${wClass}">${waitLabel(wait)}</div>
        </div>
        <div class="wait-bar-wrap">
          <div class="wait-bar ${bClass}" style="width:${barWidth(wait)}"></div>
        </div>
      `;
      grid.appendChild(card);
    });

    app.appendChild(section);
  }

  if (!anyVisible) {
    app.innerHTML = `<div class="loading">No airports found for "${filter}"</div>`;
  }
}

function filterAirports() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  render(q);
}

// Initial load
loadAll();

// Auto-refresh every 5 minutes
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
